services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    user: "0:0"
    ports:
      - "80:80"
      - "443:443"
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/apps/traefik/data:/data

networks:
  proxy:
    name: proxy
